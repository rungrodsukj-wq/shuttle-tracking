<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Shuttle Tracker - ระบบติดตามรถรับส่ง</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        // ตั้งค่า Tailwind ให้ใช้ฟอนต์ Kanit
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: { sans: ['Kanit', 'sans-serif'] },
              colors: {
                premium: {
                    dark: '#142850',
                    main: '#1a3673',
                    light: '#27498f'
                }
              }
            }
          }
        }
    </script>

    <style>
        body { 
            margin: 0; padding: 0; 
            overflow: hidden; 
            background-color: #f8fafc;
        }
        
        #map { height: 100vh; width: 100%; z-index: 1; position: absolute; top: 0; left: 0; }

        /* การอนิเมชันตอนย่อ/ขยาย Panel */
        #mainPanel { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        #mainPanel.collapsed #panel-content { 
            max-height: 0; 
            padding-top: 0; 
            padding-bottom: 0; 
            opacity: 0; 
            overflow: hidden;
        }
        #panel-content {
            max-height: 600px; /* ความสูงเผื่อเนื้อหา */
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
        }

        .toggle-icon { transition: transform 0.4s ease; }
        #mainPanel.collapsed .toggle-icon { transform: rotate(180deg); }

        /* ไฟ LED สถานะรถ */
        .led-indicator { transition: all 0.3s ease; }
        .led-indicator.on { 
            background-color: #10b981; /* Emerald 500 */
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.6);
        }
        .led-indicator.off { 
            background-color: #94a3b8; /* Slate 400 */
        }

        /* ตกแต่ง Scrollbar ของลิสต์จุดจอด */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* ป้ายชื่อสถานีบนแผนที่ (Pill shape) */
        .leaflet-tooltip.station-label {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            padding: 4px 10px;
            font-family: 'Kanit', sans-serif;
            font-size: 11px;
            font-weight: 500;
            color: #1e293b;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            white-space: nowrap;
        }
        .leaflet-tooltip-top:before, .leaflet-tooltip-bottom:before,
        .leaflet-tooltip-left:before, .leaflet-tooltip-right:before { display: none !important; }

        /* กล่องเลือกเลเยอร์แผนที่ */
        .leaflet-control-layers {
            border-radius: 16px !important;
            border: 1px solid rgba(255,255,255,0.8) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;
            font-family: 'Kanit', sans-serif;
            overflow: hidden;
        }
        .invisible-icon { background: transparent; border: none; }
    </style>
</head>
<body class="antialiased">

    <div id="map"></div>

    <div class="absolute top-4 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-[1000] drop-shadow-2xl" id="mainPanel">
        <div class="bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl overflow-hidden shadow-xl shadow-blue-900/5">
            
            <div class="bg-gradient-to-r from-premium-dark via-premium-main to-premium-light p-5 cursor-pointer relative overflow-hidden flex justify-between items-center" onclick="togglePanel()">
                <div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-2xl pointer-events-none"></div>
                
                <div class="relative z-10 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white backdrop-blur-sm">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/></svg>
                    </div>
                    <div>
                        <h3 class="text-white font-semibold text-lg leading-tight tracking-wide">แผนที่รถรับส่ง</h3>
                        <p class="text-blue-200/80 text-xs font-light mt-0.5">แตะเพื่อซ่อน/ขยายแผงควบคุม</p>
                    </div>
                </div>

                <div class="relative z-10 flex items-center gap-2">
                    <a href="admin.html" onclick="event.stopPropagation()" class="bg-white/10 hover:bg-white/20 border border-white/20 px-3 py-2 rounded-xl text-white text-xs font-medium backdrop-blur-sm transition active:scale-95 flex items-center gap-1.5" title="จัดการระบบ">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 110-9h.75c.704 0 1.402-.03 2.09-.09m0 9.18c.253.962.584 1.892.985 2.783.247.55.06 1.21-.463 1.511l-.657.38c-.551.318-1.26.117-1.527-.461a20.845 20.845 0 01-1.44-4.282m3.102.069a18.03 18.03 0 01-.59-4.59c0-1.586.205-3.124.59-4.59m0 9.18a23.848 23.848 0 018.835 2.535M10.34 6.66a23.847 23.847 0 008.835-2.535m0 0A23.74 23.74 0 0018.795 3m.38 1.125a23.91 23.91 0 011.014 5.395m-1.014-8.81c-2.28 1.093-4.686 1.894-7.185 2.399m-8.333-.002A23.868 23.868 0 004.5 5.25m0 0C2.923 5.438 1.42 5.766 0 6.223M4.5 5.25v2.86m0-2.86v-2.86m0 0c1.542-.456 3.14-.827 4.792-1.09m-4.792 1.09L3.5 4.5m1.002-.676c1.233-.356 2.502-.653 3.805-.884m-3.805.884c.594.137 1.18.293 1.76.468" /></svg>
                        <span class="hidden sm:inline">ตั้งค่า</span>
                    </a>
                    <svg class="toggle-icon w-5 h-5 text-blue-200" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
                </div>
            </div>
            
            <div id="panel-content" class="px-5 pb-5 pt-4">
                
                <div class="grid grid-cols-2 gap-3 mb-5">
                    <button class="relative overflow-hidden group bg-white border border-slate-200 rounded-2xl p-3.5 text-left shadow-sm hover:shadow-md transition duration-200 active:scale-[0.98]" onclick="focusVan('van1')">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-50 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                        <div class="relative z-10 font-semibold text-slate-800 text-[0.9rem] flex items-center gap-1.5">
                            🚍 รถคันที่ 1
                        </div>
                        <div class="relative z-10 mt-2.5 inline-flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-full text-[0.7rem] text-slate-500 border border-slate-100 font-medium">
                            <span class="w-2 h-2 rounded-full led-indicator off" id="led-van1"></span>
                            <span id="status-van1">รอสัญญาณ</span>
                        </div>
                    </button>

                    <button class="relative overflow-hidden group bg-white border border-slate-200 rounded-2xl p-3.5 text-left shadow-sm hover:shadow-md transition duration-200 active:scale-[0.98]" onclick="focusVan('van2')">
                        <div class="absolute inset-0 bg-gradient-to-br from-rose-50 to-transparent opacity-0 group-hover:opacity-100 transition duration-300"></div>
                        <div class="relative z-10 font-semibold text-slate-800 text-[0.9rem] flex items-center gap-1.5">
                            🚍 รถคันที่ 2
                        </div>
                        <div class="relative z-10 mt-2.5 inline-flex items-center gap-1.5 bg-slate-50 px-2.5 py-1 rounded-full text-[0.7rem] text-slate-500 border border-slate-100 font-medium">
                            <span class="w-2 h-2 rounded-full led-indicator off" id="led-van2"></span>
                            <span id="status-van2">รอสัญญาณ</span>
                        </div>
                    </button>
                </div>

                <div class="border-t border-slate-100 pt-4">
                    <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-widest flex items-center gap-1.5 mb-3">
                        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 17.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
                        ลำดับป้ายรถ (แตะเพื่อดู)
                    </h4>
                    
                    <div class="max-h-[220px] overflow-y-auto pr-1 space-y-2 custom-scrollbar" id="stationOverviewList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBL4nhltSeXZTtgShoqgvWG4tcyb92XOzw",
            authDomain: "my-apartment-shuttle.firebaseapp.com",
            databaseURL: "https://my-apartment-shuttle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apartment-shuttle",
            storageBucket: "my-apartment-shuttle.firebasestorage.app",
            messagingSenderId: "808566202899",
            appId: "1:808566202899:web:5626ae23c0df6335d455e6"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. Map Setup
        const mapVoyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapPositron = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapDark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'OpenStreetMap' });
        const mapSatellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' });

        const map = L.map('map', { 
            zoomControl: false, 
            layers: [mapPositron] 
        }).setView([13.801307, 100.311848], 15);

        const baseMaps = {
            "⚪ แผนที่มินิมอลขาว": mapPositron,
            "🎨 แผนที่สีสันเดิม": mapVoyager,
            "⚫ โหมดมืดสุดล้ำ": mapDark,
            "📸 ภาพถ่ายดาวเทียม": mapSatellite
        };

        L.control.layers(baseMaps, null, { position: 'bottomleft' }).addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 3. ฟังก์ชัน UI พับเก็บ
        function togglePanel() {
            document.getElementById('mainPanel').classList.toggle('collapsed');
        }

        let currentStations = [];
        let stationLayers = [];

        // 4. ดึงจุดจอดจาก Firebase
        db.ref('stations').on('value', (snap) => {
            currentStations = snap.val() || [];

            stationLayers.forEach(layer => map.removeLayer(layer));
            stationLayers = [];

            const listEl = document.getElementById('stationOverviewList');
            listEl.innerHTML = '';

            let orderIndex = 1;

            currentStations.forEach((s) => {
                if (!s || s.active === false) return;

                // หมุดบนแผนที่
                const invisibleIcon = L.divIcon({ className: 'invisible-icon', iconSize: [0, 0] });
                const marker = L.marker([s.lat, s.lng], { icon: invisibleIcon }).addTo(map)
                 .bindTooltip(s.name, { permanent: true, direction: 'center', className: 'station-label' });
                stationLayers.push(marker);

                // รายการ UI ด้วยคลาส Tailwind
                const item = document.createElement('div');
                item.className = 'group flex items-center justify-between gap-3 p-2.5 bg-slate-50 hover:bg-[#1a3673]/5 border border-slate-100 hover:border-[#1a3673]/20 rounded-xl cursor-pointer transition-all duration-200';
                item.onclick = () => {
                    map.flyTo([s.lat, s.lng], 16.5, { duration: 1.2 });
                    if (window.innerWidth < 600) togglePanel();
                };

                const mandatoryTag = s.mandatory 
                    ? `<span class="text-[0.6rem] bg-rose-100 text-rose-600 px-2 py-0.5 rounded-md font-medium whitespace-nowrap">ห้ามข้าม</span>` 
                    : '';

                item.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-6 h-6 rounded-full bg-white text-slate-600 flex items-center justify-center text-xs font-semibold shadow-sm border border-slate-200 flex-shrink-0 group-hover:text-premium-main group-hover:border-premium-light transition-colors">${orderIndex}</div>
                        <div class="text-[0.85rem] text-slate-700 font-medium truncate group-hover:text-premium-dark transition-colors" title="${s.name}">${s.name}</div>
                    </div>
                    ${mandatoryTag}
                `;
                listEl.appendChild(item);
                orderIndex++;
            });
        });

        // 5. ระบบติดตามรถ (ใช้ไอคอนเดิม สีเส้นทางเข้ากับธีม)
        const iconBlue = L.icon({ iconUrl: 'https://cdn-icons-png.freepik.com/512/386/386405.png?ga=GA1.1.1656679989.1770308490', iconSize: [46, 46], iconAnchor: [23, 23] });
        const iconPink = L.icon({ iconUrl: 'https://cdn-icons-png.freepik.com/512/386/386456.png?ga=GA1.1.1656679989.1770308490', iconSize: [46, 46], iconAnchor: [23, 23] });

        const vans = {
            van1: { marker: null, icon: iconBlue, path: L.polyline([], {color: '#1a3673', weight: 4, dashArray: '5, 10', opacity: 0.8}).addTo(map) },
            van2: { marker: null, icon: iconPink, path: L.polyline([], {color: '#e11d48', weight: 4, dashArray: '5, 10', opacity: 0.8}).addTo(map) }
        };

        function focusVan(id) {
            if (vans[id].marker) {
                map.flyTo(vans[id].marker.getLatLng(), 16.5, {duration: 1.2});
                document.getElementById('mainPanel').classList.add('collapsed');
            } else {
                alert("รถคันนี้ยังไม่ส่งสัญญาณเข้าสู่ระบบครับ");
            }
        }

        function trackShuttle(id) {
            db.ref('shuttles/' + id).on('value', (snap) => {
                const data = snap.val();
                const elStatus = document.getElementById(`status-${id}`);
                const elLed = document.getElementById(`led-${id}`);
                const v = vans[id];

                if (data && data.active) {
                    const pos = [data.lat, data.lng];
                    if (!v.marker) v.marker = L.marker(pos, {icon: v.icon}).addTo(map).bindPopup(`<b style="font-family:'Kanit'; text-sm">อัปเดตล่าสุด: ${id === 'van1' ? 'รถคันที่ 1' : 'รถคันที่ 2'}</b>`);
                    else v.marker.setLatLng(pos);
                    v.path.addLatLng(pos);

                    elStatus.innerText = "กำลังวิ่ง";
                    elStatus.classList.replace('text-slate-500', 'text-emerald-600');
                    elLed.classList.replace('off', 'on');
                } else {
                    elStatus.innerText = "ออฟไลน์";
                    elStatus.classList.replace('text-emerald-600', 'text-slate-500');
                    elLed.classList.replace('on', 'off');
                }
            });
        }

        trackShuttle('van1');
        trackShuttle('van2');

        // เคลียร์เส้น Realtime ทุก 30 นาที
        setInterval(() => {
            const m = new Date().getMinutes();
            if (m === 0 || m === 30) { vans.van1.path.setLatLngs([]); vans.van2.path.setLatLngs([]); }
        }, 60000);
    </script>
</body>
</html>
