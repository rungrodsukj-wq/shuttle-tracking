<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - จัดการจุดจอด</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Kanit', 'sans-serif'],
              }
            }
          }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-700 min-h-screen antialiased font-sans">

    <div class="max-w-4xl mx-auto px-4 py-10">
        <!-- Header -->
        <div class="bg-gradient-to-r from-[#142850] via-[#1a3673] to-[#27498f] text-white p-8 rounded-2xl mb-8 shadow-xl shadow-blue-900/10 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/5 rounded-full blur-2xl"></div>
            
            <div class="relative z-10">
                <span class="text-xs font-semibold tracking-widest text-blue-200 uppercase bg-white/10 px-3 py-1 rounded-full backdrop-blur-sm">Management Console</span>
                <h2 class="text-2xl font-semibold tracking-wide flex items-center gap-3 mt-2">
                    <svg class="w-7 h-7 text-blue-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498l4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 00-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0z"/></svg>
                    จัดการจุดจอดรถบัสรับส่ง
                </h2>
                <p class="text-sm text-blue-200/80 mt-1.5 font-light">คลิกที่ชื่อเพื่อแก้ไข | ลาก ☰ เพื่อสลับลำดับ | อัปเดตพิกัดแผนที่</p>
            </div>

            <div class="relative z-10 flex-shrink-0">
                <a href="monitor.html" class="inline-flex items-center gap-2 bg-white/10 hover:bg-white/20 text-white border border-white/25 px-4 py-2.5 rounded-xl text-sm font-medium transition backdrop-blur-sm shadow-sm active:scale-95 group">
                    <svg class="w-4 h-4 text-blue-300 group-hover:text-white transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    ไปหน้าติดตามรถ (Monitor)
                </a>
            </div>
        </div>

        <!-- รายชื่อจุดจอด -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden divide-y divide-slate-100" id="station-list">
            <!-- จะถูกแทรกโดย JS -->
        </div>
    </div>

    <!-- Modal เปลี่ยนพิกัดแผนที่ -->
    <div class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md z-[2000] items-center justify-center p-4 transition-all duration-300 opacity-0" id="map-modal">
        <div class="bg-white w-full max-w-xl rounded-2xl overflow-hidden shadow-2xl flex flex-col transform transition-all scale-95 duration-300" id="modal-container">
            <div class="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-base font-semibold text-slate-800 flex items-center gap-2.5" id="modal-title">
                    เปลี่ยนพิกัดจุดจอด
                </h3>
            </div>
            <div id="modal-map" class="h-[420px] w-full bg-slate-100"></div>
            <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                <button class="bg-white hover:bg-slate-100 text-slate-600 border border-slate-200 px-5 py-2.5 rounded-xl text-sm font-medium transition active:scale-95" onclick="closeMapModal()">ยกเลิก</button>
                <button class="bg-[#1a3673] hover:bg-[#142850] text-white px-5 py-2.5 rounded-xl text-sm font-medium transition shadow-lg shadow-blue-900/20 flex items-center gap-2 active:scale-95" onclick="saveLocation()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                    บันทึกพิกัดใหม่
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <script>
        // 1. Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBL4nhltSeXZTtgShoqgvWG4tcyb92XOzw",
            authDomain: "my-apartment-shuttle.firebaseapp.com",
            databaseURL: "https://my-apartment-shuttle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apartment-shuttle",
            storageBucket: "my-apartment-shuttle.firebasestorage.app",
            messagingSenderId: "808566202899",
            appId: "1:808566202899:web:5626ae23c0df6335d455e6"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStations = [];
        let mapInstance = null;
        let editMarker = null;
        let editingStationIndex = -1;

        // 2. ดึงข้อมูลจาก Firebase
        db.ref('stations').on('value', (snap) => {
            currentStations = snap.val() || [];
            
            // ป้องกันการรีเฟรชหน้าจอในขณะที่กำลังพิมพ์เปลี่ยนชื่อ (ตรวจสอบ focus)
            const activeElement = document.activeElement;
            const isEditingName = activeElement && activeElement.tagName === 'INPUT' && activeElement.type === 'text';
            
            if (!isEditingName) {
                renderUI();
            }
        });

        // 3. ฟังก์ชันวาด UI
        function renderUI() {
            const listEl = document.getElementById('station-list');
            listEl.innerHTML = '';

            currentStations.forEach((station, index) => {
                if (!station) return;

                const div = document.createElement('div');
                div.className = 'flex flex-col md:flex-row md:items-center justify-between p-5 hover:bg-slate-50/60 transition duration-200 gap-4';
                div.setAttribute('data-index', index);

                // สไตล์เปลี่ยนตามสถานะ Active / Inactive
                const inputStyle = station.active 
                    ? 'text-slate-800 font-medium' 
                    : 'text-slate-400 opacity-60 font-normal line-through';

                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1 min-w-[260px]">
                        <span class="drag-handle p-2 text-slate-300 hover:text-slate-500 rounded-xl hover:bg-slate-100 cursor-grab active:cursor-grabbing transition duration-200">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M7 2a1 1 0 11.001 2.001A1 1 0 017 2zm0 6a1 1 0 11.001 2.001A1 1 0 017 8zm0 6a1 1 0 11.001 2.001A1 1 0 017 14zm6-12a1 1 0 11.001 2.001A1 1 0 0113 2zm0 6a1 1 0 11.001 2.001A1 1 0 0113 8zm0 6a1 1 0 11.001 2.001A1 1 0 0113 14z"/></svg>
                        </span>
                        
                        <!-- แก้ไขเป็นช่องกรอกชื่อจุดจอด -->
                        <div class="flex items-center gap-3 flex-1 group">
                            <!-- <span class="inline-flex items-center justify-center text-xs bg-slate-100 text-slate-600 w-6 h-6 rounded-full font-semibold border border-slate-200/50 shadow-sm flex-shrink-0">${index}</span> -->
                            
                            <div class="relative w-full max-w-[280px]">
                                <input type="text" 
                                       value="${station.name}" 
                                       onchange="updateStation(${index}, 'name', this.value)" 
                                       class="w-full bg-transparent border border-transparent hover:border-slate-300 focus:border-[#1a3673]/50 focus:bg-white focus:ring-4 focus:ring-[#1a3673]/10 focus:outline-none px-2.5 py-1.5 rounded-lg transition-all text-sm sm:text-base ${inputStyle}"
                                       title="คลิกเพื่อพิมพ์เปลี่ยนชื่อจุดจอด"
                                       placeholder="ตั้งชื่อจุดจอด...">
                                <!-- ไอคอนดินสอที่จะแสดงเมื่อเอาเมาส์ชี้ -->
                                <svg class="w-3.5 h-3.5 text-slate-300 absolute right-3 top-1/2 -translate-y-1/2 opacity-0 group-hover:opacity-100 transition pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                            </div>
                        </div>
                    </div>
                    
                    <!-- ส่วนปุ่มสวิตช์และพิกัด -->
                    <div class="flex items-center gap-6 text-xs sm:text-sm justify-between md:justify-end flex-wrap mt-2 md:mt-0">
                        <label class="relative inline-flex items-center cursor-pointer select-none group">
                            <input type="checkbox" onchange="updateStation(${index}, 'active', this.checked)" ${station.active ? 'checked' : ''} class="sr-only peer">
                            <div class="w-10 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-emerald-500 transition duration-200"></div>
                            <span class="ms-2.5 text-xs font-medium text-slate-500 group-hover:text-slate-700 transition">เปิดใช้งาน</span>
                        </label>
                        
                        <label class="relative inline-flex items-center cursor-pointer select-none group">
                            <input type="checkbox" onchange="updateStation(${index}, 'mandatory', this.checked)" ${station.mandatory ? 'checked' : ''} class="sr-only peer">
                            <div class="w-10 h-6 bg-slate-200 rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-rose-500 transition duration-200"></div>
                            <span class="ms-2.5 text-xs font-medium text-slate-500 group-hover:text-rose-600 transition">ห้ามข้าม</span>
                        </label>
                        
                        <button class="inline-flex items-center gap-1.5 bg-white hover:bg-slate-50 active:bg-slate-100 text-slate-700 font-medium px-3.5 py-2 rounded-xl border border-slate-200 shadow-sm text-xs transition duration-200" onclick="openMapModal(${index})">
                            <svg class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                            พิกัด
                        </button>
                    </div>
                `;
                listEl.appendChild(div);
            });

            // ลากสลับ
            new Sortable(listEl, {
                handle: '.drag-handle',
                animation: 250,
                ghostClass: 'bg-slate-50',
                chosenClass: 'shadow-md',
                onEnd: function () {
                    const htmlItems = Array.from(listEl.children);
                    const newStationsOrder = htmlItems.map((item, newIndex) => {
                        const oldIndex = item.getAttribute('data-index');
                        let stationData = { ...currentStations[oldIndex] };
                        stationData.id = newIndex; 
                        return stationData;
                    });
                    db.ref('stations').set(newStationsOrder);
                }
            });
        }

        // 4. ฟังก์ชันอัปเดตข้อมูล (รองรับทั้ง สวิตช์ และ การเปลี่ยนชื่อ)
        window.updateStation = function(index, field, value) {
            db.ref(`stations/${index}`).update({ [field]: value });
        };

        // 5. ระบบ Modal เปลี่ยนพิกัดแผนที่ (ใช้โค้ดเดิม)
        window.openMapModal = function(index) {
            editingStationIndex = index;
            const station = currentStations[index];
            
            document.getElementById('modal-title').innerHTML = `
                <svg class="w-5 h-5 text-[#1a3673]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                ปรับเปลี่ยนพิกัด: <span class="font-semibold text-slate-800">${station.name}</span>
            `;
            
            const modal = document.getElementById('map-modal');
            const container = document.getElementById('modal-container');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                container.classList.remove('scale-95');
                container.classList.add('scale-100');
            }, 10);

            if (!mapInstance) {
                mapInstance = L.map('modal-map').setView([station.lat, station.lng], 16);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapInstance);
                
                editMarker = L.marker([station.lat, station.lng], { draggable: true }).addTo(mapInstance);
                editMarker.bindPopup("<b class='font-sans text-xs'>ลากหมุดนี้เพื่อย้ายพิกัดป้าย</b>").openPopup();
            } else {
                mapInstance.setView([station.lat, station.lng], 16);
                editMarker.setLatLng([station.lat, station.lng]);
            }

            setTimeout(() => {
                mapInstance.invalidateSize();
            }, 250);
        };

        window.closeMapModal = function() {
            const modal = document.getElementById('map-modal');
            const container = document.getElementById('modal-container');
            
            modal.classList.add('opacity-0');
            container.classList.remove('scale-100');
            container.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 300);
        };

        window.saveLocation = function() {
            if (editingStationIndex === -1) return;
            
            const newPos = editMarker.getLatLng();
            db.ref(`stations/${editingStationIndex}`).update({ 
                lat: newPos.lat, 
                lng: newPos.lng 
            }).then(() => {
                closeMapModal();
            }).catch(err => {
                alert('เกิดข้อผิดพลาด: ' + err.message);
            });
        };
    </script>
</body>
</html>
