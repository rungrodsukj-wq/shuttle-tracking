<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Salaya One - Schematic Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #0b2240; } /* ใช้พื้นหลังสีน้ำเงินเข้มให้เนียนไปกับภาพ */
        #map { height: 100vh; width: 100%; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. ตั้งค่าแผนที่ให้เป็นระบบรูปภาพ (CRS.Simple) ไม่ใช่แผนที่โลก
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 2,
            zoomControl: true
        });

        // 2. กำหนดขนาดของรูปภาพ (กว้าง x สูง เป็นพิกเซล)
        // สมมติว่ารูปภาพของคุณมีขนาด 800 x 1100 พิกเซล
        const w = 800;
        const h = 1100;
        const bounds = [[0, 0], [h, w]];

        // 3. ใส่รูปภาพแผนที่เส้นทางเข้าไปในระบบ
        // เปลี่ยน 'shuttle_route.png' เป็น URL รูปภาพของคุณจริง ๆ
        const image = L.imageOverlay('shuttle_route.png', bounds).addTo(map);

        // สั่งให้หน้าจอโฟกัสไปที่รูปภาพทั้งหมดพอดี
        map.fitBounds(bounds);

        // 4. กำหนดตำแหน่งพิกเซล (Y, X) ของแต่ละสถานีบนรูปภาพ
        // (คุณต้องลองจิ้มหาพิกัดบนรูปภาพของคุณเองซักครู่หนึ่ง)
        const stationPixels = {
            station1: [480, 620],  // สมมติพิกัดจุดที่ 1 (College of Music)
            station2: [400, 480],  // สมมติพิกัดจุดที่ 2
            station14: [610, 110]  // สมมติพิกัดจุดที่ 14 (MUIDS)
        };

        // 5. สร้างไอคอนรถรับส่ง
        const vanIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.freepik.com/512/386/386405.png', // ไอคอนรถสีฟ้า
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        // สร้างตัวแปรหมุดรถคันที่ 1 ไว้ที่ตำแหน่งเริ่มต้น (เช่น สถานี 1)
        const van1Marker = L.marker(stationPixels.station1, { icon: vanIcon }).addTo(map);


        // 🔄 6. ตัวอย่างจำลองการทำงานร่วมกับ Firebase
        // เมื่อดึงพิกัดจริงมาแล้ว แปลงค่าเข้าสู่ระบบภาพอินโฟกราฟิก
        function updateVanPositionOnImage(currentStationId) {
            const newPos = stationPixels[currentStationId];
            if (newPos) {
                // ใช้ .slideTo() (หากใช้ปลั๊กอิน) หรือ .setLatLng() เพื่อให้รถขยับ
                van1Marker.setLatLng(newPos); 
            }
        }

        // ตัวอย่างการสั่งงาน: ถ้ารถวิ่งไปถึงจุด 14 โค้ดจะย้ายรถไปจุด 14 ทันที
        // updateVanPositionOnImage('station14');

    </script>
</body>
</html>
