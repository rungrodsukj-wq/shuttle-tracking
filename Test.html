<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salaya One - Premium Schematic Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #051329;        /* สีกรมท่ามืดลึกพื้นหลัง */
            --map-bg: #0b2447;         /* สีกรมท่าสว่างตามแผ่นป้ายหลัก */
            --station-yellow: #facc15; /* สีเหลืองสว่างตามหมุดในภาพ */
            --road-white: #ffffff;
            --road-dash: #e11d48;      /* เส้นประสีแดงตรงกลางถนน */
            --s1-color: #3B82F6;       /* สีรถคันที่ 1 (ฟ้า) */
            --s2-color: #EC4899;       /* สีรถคันที่ 2 (ชมพู) */
        }

        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: var(--bg-dark);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* กล่องการ์ดหลักดีไซน์ตามกรอบแผ่นป้ายในภาพ */
        .map-card {
            background: var(--map-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            padding: 20px;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-sizing: border-box;
        }

        /* ส่วนหัวข้อแบนเนอร์ */
        .map-header {
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }
        .map-header h2 { margin: 0; font-size: 22px; color: #ffffff; font-weight: 700; letter-spacing: 0.5px; }
        .map-header p { margin: 3px 0 0 0; font-size: 11px; color: var(--station-yellow); letter-spacing: 1px; font-weight: 500; }

        /* ตัวบ่งชี้สถานะรถ */
        .legend-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 15px;
            color: #fff;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; font-weight: 600; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* --- ผังแผนที่ระบบเวกเตอร์ (SVG Container) --- */
        .map-canvas-wrapper {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 18px;
            overflow: visible;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        /* ข้อความป้ายสถานีในแผนที่ */
        .svg-station-text {
            font-family: 'Kanit', sans-serif;
            font-size: 10px;
            fill: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            transition: all 0.3s;
        }
        .active-target-text {
            fill: #ffffff !important;
            font-weight: 600 !important;
            font-size: 11px;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        /* ตกแต่งตัวอักษรเกทประตูและข้อความพิเศษ */
        .gate-text {
            font-family: 'Kanit', sans-serif;
            font-size: 9px;
            font-weight: 600;
            fill: #60a5fa;
        }

        /* --- 🚐 ไอคอนรถรับส่งแบบเคลื่อนที่สมูท --- */
        .bus-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .shuttle-bus {
            position: absolute;
            width: 30px; height: 30px;
            border-radius: 50%;
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            z-index: 100;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            /* สั่งให้รถวิ่งขยับตามโค้งถนนอย่างสมูทนุ่มนวล */
            transition: left 0.8s cubic-bezier(0.25, 1, 0.5, 1), top 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s;
        }
        .shuttle-bus.active-run { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        
        .bus-v1 { background: var(--s1-color); box-shadow: 0 0 15px var(--s1-color); }
        .bus-v2 { background: var(--s2-color); box-shadow: 0 0 15px var(--s2-color); }

        .pulse-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            animation: busGlow 2s infinite; z-index: -1;
        }
        @keyframes busGlow { 
            0% { transform: scale(1); opacity: 0.6; } 
            100% { transform: scale(2.2); opacity: 0; } 
        }
    </style>
</head>
<body>

    <div class="map-card">
        <div class="map-header">
            <h2>SALAYA ONE</h2>
            <p>Shuttle Service Route</p>
        </div>

        <div class="legend-bar">
            <div class="legend-item"><div class="legend-dot" style="background: var(--s1-color);"></div> Shuttle 1</div>
            <div class="legend-item"><div class="legend-dot" style="background: var(--s2-color);"></div> Shuttle 2</div>
        </div>

        <!-- กล่องแผนที่โครงข่ายถนนจำลอง -->
        <div class="map-canvas-wrapper">
            <svg viewBox="0 0 400 500" id="vector-map">
                <!-- 1. วาดเลเยอร์พื้นถนนสีขาวหนาด้านล่าง -->
                <g id="road-base-layer" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
                    <!-- ประตู 1 วิ่งเข้าหาจุด 1 ลูบขึ้นด้านบน -->
                    <path d="M 370 230 L 290 230 L 290 200 L 220 200 L 220 160 L 370 160 L 370 110 L 220 110 L 220 150" />
                    <!-- โครงสร้างถนนโซนกลางและโซนซ้ายสเน็คคดเคี้ยวตามภาพโปสเตอร์ -->
                    <path d="M 220 160 L 140 160 L 140 230 L 200 230 L 200 290 L 140 290 L 140 260" />
                    <path d="M 140 230 L 50 230 L 50 290 L 130 290 L 130 340 L 260 340 L 260 380 L 130 380 L 130 420" />
                    <!-- ประตู 5 พิเศษโรงเรียนสาธิต MUIDS ด้านซ้าย -->
                    <path d="M 40 140 L 40 190" stroke-width="12" />
                    <path d="M 40 165 L 75 165" stroke-width="3" stroke="#e11d48" />
                </g>

                <!-- 2. วาดเลเยอร์เส้นประสีแดงตรงกลางถนนเพื่อให้เหมือนภาพต้นฉบับ -->
                <g id="road-dash-layer" fill="none" stroke="#e11d48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4, 5">
                    <path d="M 370 230 L 290 230 L 290 200 L 220 200 L 220 160 L 370 160 L 370 110 L 220 110 L 220 150" />
                    <path d="M 220 160 L 140 160 L 140 230 L 200 230 L 200 290 L 140 290 L 140 260" />
                    <path d="M 140 230 L 50 230 L 50 290 L 130 290 L 130 340 L 260 340 L 260 380 L 130 380 L 130 420" />
                    <path d="M 40 140 L 40 190" stroke-width="1" />
                </g>

                <!-- 3. วาดข้อความกำกับสถานที่/ประตูต่างๆ บนผังอินโฟกราฟิก -->
                <g id="decorations">
                    <text x="300" y="245" class="gate-text">≪ ENTRANCE GATE 1</text>
                    <text x="200" y="395" class="gate-text">≪ EXIT GATE 6</text>
                    <text x="20" y="130" class="gate-text" style="fill:#facc15;">Gate 5 (MUIDS)</text>
                </g>

                <!-- 4. ส่วนสร้างหมุดสถานีวงกลมสีเหลืองพร้อมข้อความชื่อจุดจอด -->
                <g id="stations-group"></g>
            </svg>

            <!-- 5. ชั้นสำหรับแสดงรถรับส่ง (Bus Layer) วิ่งอยู่เหนือแผ่นป้าย -->
            <div class="bus-layer">
                <div class="shuttle-bus bus-v1" id="dom-bus-v1">
                    <div class="pulse-ring" style="background: rgba(59, 130, 246, 0.4);"></div>
                    <i class="fas fa-shuttle-van"></i>
                </div>
                <div class="shuttle-bus bus-v2" id="dom-bus-v2">
                    <div class="pulse-ring" style="background: rgba(236, 72, 153, 0.4);"></div>
                    <i class="fas fa-shuttle-van"></i>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. กำหนดค่าเชื่อมต่อ Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBL4nhltSeXZTtgShoqgvWG4tcyb92XOzw",
            authDomain: "my-apartment-shuttle.firebaseapp.com",
            databaseURL: "https://my-apartment-shuttle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "my-apartment-shuttle",
            storageBucket: "my-apartment-shuttle.firebasestorage.app",
            messagingSenderId: "808566202899",
            appId: "1:808566202899:web:5626ae23c0df6335d455e6"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. ข้อมูลพิกัด (X, Y) เปอร์เซ็นต์สำหรับกระจายจุดจอดลงบนผัง SVG ให้เหมือนภาพโปสเตอร์ต้นฉบับ
        const stationMetadata = [
            { id: "★", x: 310, y: 200, name: "Salaya One Apartment", textX: 250, textY: 185 },
            { id: "1",  x: 250, y: 200, name: "College of Music", textX: 215, textY: 215 },
            { id: "2",  x: 220, y: 150, name: "Faculty of Science", textX: 235, textY: 153 },
            { id: "3",  x: 220, y: 125, name: "Faculty of Social Sciences", textX: 235, textY: 128 },
            { id: "4",  x: 350, y: 160, name: "MUIC Building 2", textX: 300, textY: 175 },
            { id: "5",  x: 290, y: 110, name: "MUIC Building 1", textX: 265, textY: 98 },
            { id: "6",  x: 240, y: 110, name: "Campus Building", textX: 215, textY: 98 },
            { id: "7",  x: 170, y: 160, name: "Faculty of Engineering", textX: 125, textY: 150 },
            { id: "8",  x: 170, y: 230, name: "ICT Technology", textX: 175, textY: 245 },
            { id: "9",  x: 90,  y: 230, name: "Faculty of Medical Tech", textX: 45,  textY: 218 },
            { id: "10", x: 50,  y: 260, name: "Physical & Med Tech", textX: 45,  textY: 310 },
            { id: "11", x: 130, y: 310, name: "Faculty of Liberal Arts", textX: 65,  textY: 325 },
            { id: "12", x: 190, y: 340, name: "Electric Mini-Bus", textX: 160, textY: 358 },
            { id: "13", x: 170, y: 420, name: "Faculty of Veterinary", textX: 135, textY: 440 },
            { id: "14", x: 40,  y: 165, name: "MUIDS โรงเรียนสาธิต", textX: 20,  textY: 205 }
        ];

        // 3. ฟังก์ชันเรนเดอร์หมุดวงกลมสีเหลืองและข้อความลงใน SVG บอร์ดแบบไดนามิก
        function renderVectorStations() {
            const group = document.getElementById('stations-group');
            let htmlContent = '';

            stationMetadata.forEach((st, index) => {
                htmlContent += `
                    <!-- กลุ่มหมุดสถานีแต่ละจุด -->
                    <g id="svg-st-group-${index}">
                        <!-- เส้นผ่านศูนย์กลางวงกลมเหลืองตัวอักษรดำตามภาพ -->
                        <circle cx="${st.x}" cy="${st.y}" r="8" fill="#facc15" stroke="#0b2447" stroke-width="1.5" />
                        <text x="${st.x}" y="${st.y + 3}" font-family="'Inter'" font-size="8" font-weight="700" fill="#000000" text-anchor="middle">${st.id}</text>
                        
                        <!-- ชื่อข้อความสถานีระบุพิกัดแยกส่วนป้องกันการซ้อนทับ -->
                        <text x="${st.textX}" y="${st.textY}" id="svg-text-${index}" class="svg-station-text">${st.name}</text>
                    </g>
                `;
            });
            group.innerHTML = htmlContent;
        }
        renderVectorStations();

        // 4. ฟังก์ชันหลักสำหรับแปลงตำแหน่งพิกเซลจาก SVG ให้กลายเป็นค่าร้อยละ (%) เพื่อสั่งงานกล่อง Bus Layer (HTML Div)
        function positionBusOnCanvas(busElement, stopIndex) {
            const coord = stationMetadata[stopIndex];
            const svgEl = document.getElementById('vector-map');
            
            if (coord && busElement && svgEl) {
                // อ้างอิงจากขนาดช่อง ViewBox [กว้าง 400 x สูง 500] 
                const pctX = (coord.x / 400) * 100;
                const pctY = (coord.y / 500) * 100;

                // ใส่ค่าตำแหน่งลงไป รถจะสไลด์ตัววิ่งไปตามถนนอย่างสวยงาม
                busElement.style.left = `${pctX}%`;
                busElement.style.top = `${pctY}%`;
            }
        }

        // 5. จัดการอัปเดตสถานะ Active และไฮไลต์ข้อความสว่างเรืองแสงเมื่อรถวิ่งมาถึง
        function updateBusState(vanId, data) {
            const currentStop = data.currentStop || 0;
            const isActive = data.active;
            const busDom = document.getElementById(vanId === 'van1' ? 'dom-bus-v1' : 'dom-bus-v2');
            
            if (isActive && currentStop >= 0 && currentStop < stationMetadata.length) {
                // คำนวณเคลื่อนที่รถรับส่ง
                positionBusOnCanvas(busDom, currentStop);
                busDom.classList.add('active-run');

                // ไฮไลต์ข้อความใน SVG จุดจอดนั้นๆ ให้สว่างขึ้นมาเด่นชัด
                const textDom = document.getElementById(`svg-text-${currentStop}`);
                if (textDom) textDom.classList.add('active-target-text');
            } else {
                busDom.classList.remove('active-run');
            }
        }

        // 6. เชื่อมต่อระบบ Firebase Realtime Stream Data
        db.ref('shuttles').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // ล้างค่าไฮไลต์เก่าออกก่อนทุกครั้งที่ข้อมูลเปลี่ยน
            document.querySelectorAll('.svg-station-text').forEach(el => {
                el.classList.remove('active-target-text');
            });

            if (data) {
                if (data.van1) updateBusState('van1', data.van1);
                if (data.van2) updateBusState('van2', data.van2);
            }
        });
    </script>
</body>
</html>
